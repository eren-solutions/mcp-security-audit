runtime: "container"
startCommand:
  type: "http"
configSchema:
  type: "object"
  properties:
    apiKey:
      type: "string"
      description: "API key for the Eren Security Auditor service"
    endpoint:
      type: "string"
      description: "Audit API endpoint URL"
  required:
    - apiKey
build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."
